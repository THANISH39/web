<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyBrand - Login & Signup</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css" />
    <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>
    <link rel="stylesheet" href="log.css">

</head>


<body>


    <div class="container">
        <div class="brand-logo"> Welcome</div>

        <form id="loginForm">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="error" id="errorMsg"></div>
        </form>

        <form id="signupForm" style="display:none;">
            <input type="text" id="newUsername" placeholder="Username" required>
            <input type="password" id="newPassword" placeholder="Password" required>
            <button type="submit">Sign Up</button>
            <div class="error" id="signupError"></div>
        </form>

        <div class="toggle-link" id="toggleForm">Don't have an account? Sign up</div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const toggleForm = document.getElementById('toggleForm');
        const formTitle = document.getElementById('formTitle');

        toggleForm.addEventListener('click', () => {
            if (loginForm.style.display !== "none") {
                loginForm.style.display = "none";
                signupForm.style.display = "block";
                formTitle.textContent = "Sign Up";
                toggleForm.textContent = "Already have an account? Login";
            } else {
                signupForm.style.display = "none";
                loginForm.style.display = "block";
                formTitle.textContent = "Login";
                toggleForm.textContent = "Don't have an account? Sign up";
            }
        });

        // Login request
        loginForm.addEventListener('submit', async e => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            const res = await fetch("http://localhost:5000/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            document.getElementById('errorMsg').textContent = data.message;
        });

        // Signup request
        signupForm.addEventListener('submit', async e => {
            e.preventDefault();
            const username = document.getElementById('newUsername').value.trim();
            const password = document.getElementById('newPassword').value.trim();

            const res = await fetch("http://localhost:5000/signup", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            document.getElementById('signupError').textContent = data.message;
        });
    </script>
</body>

</html>
